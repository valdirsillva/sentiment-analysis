<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análise de Sentimentos</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
      color: #fff;
    }

    p.sub {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 1.8rem;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 1rem;
      padding: 1rem;
      resize: none;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus {
      border-color: #5c6bc0;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: #5c6bc0;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #3f51b5;
    }

    button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    .result {
      margin-top: 1.5rem;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      display: none;
      border-left: 4px solid #5c6bc0;
    }

    .result.positivo {
      border-color: #4caf50;
    }

    .result.negativo {
      border-color: #f44336;
    }

    .emoji {
      font-size: 2.5rem;
      margin-bottom: 0.4rem;
    }

    .label {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .label.positivo {
      color: #4caf50;
    }

    .label.negativo {
      color: #f44336;
    }

    .score-bar-wrap {
      margin-top: 0.8rem;
    }

    .score-bar-wrap span {
      font-size: 0.8rem;
      color: #888;
    }

    .score-bar {
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      margin-top: 4px;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .positivo .score-bar-fill {
      background: #4caf50;
    }

    .negativo .score-bar-fill {
      background: #f44336;
    }

    .error {
      color: #f44336;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🧠 Análise de Sentimentos</h1>
    <p class="sub">Digite uma frase em inglês para classificar o sentimento.</p>

    <textarea id="input" placeholder="Ex: This movie was absolutely amazing!"></textarea>
    <button id="btn" onclick="analisar()">Analisar</button>
    <p class="error" id="error"></p>

    <div class="result" id="result">
      <div class="emoji" id="emoji"></div>
      <div class="label" id="label"></div>
      <div class="score-bar-wrap">
        <span id="score-text"></span>
        <div class="score-bar">
          <div class="score-bar-fill" id="bar"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function analisar() {
      const text = document.getElementById("input").value.trim();
      const btn = document.getElementById("btn");
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      error.textContent = "";
      if (!text) { error.textContent = "⚠️ Digite uma frase antes de analisar."; return; }

      btn.disabled = true;
      btn.textContent = "Analisando...";

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();

        const isPos = data.label === "Positivo 😊";

        // console.log(data);

        result.className = "result " + (isPos ? "positivo" : "negativo");
        document.getElementById("emoji").textContent = data.emoji;
        document.getElementById("label").textContent = data.label;
        document.getElementById("label").className = "label " + (isPos ? "positivo" : "negativo");
        document.getElementById("score-text").textContent = `Confiança: ${data.score}%`;
        document.getElementById("bar").style.width = data.score + "%";
        document.getElementById("bar").style.background = isPos ? "#4caf50" : "#f44336";
        result.style.display = "block";
      } catch {
        error.textContent = "❌ Erro ao conectar com o servidor.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analisar";
      }
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); analisar(); }
    });
  </script>
</body>

</html>
